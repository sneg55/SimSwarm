name: Build Worker Image

# Manual-only: the GPU worker image is only needed for self-hosted full-stack
# runs, not the static Cloudflare Pages demo. Build on demand.
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/simswarm-worker

jobs:
  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        # The worker image bakes Qwen3-14B (~29.5GB) into the image, so the
        # build tree needs ~50GB of free disk. jlumbroso/free-disk-space
        # reclaims ~45GB by removing Android SDK, .NET, Haskell, Docker
        # leftovers, large packages, and swap — far more than a manual rm.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Disk usage after cleanup
        run: df -h /

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Lint
        run: ruff check saas/ tests/

      - name: Check alembic single head
        run: |
          heads=$(alembic heads 2>/dev/null | wc -l)
          if [ "$heads" -gt 1 ]; then
            echo "::error::Multiple alembic heads detected! Run 'alembic merge heads' before merging."
            alembic heads
            exit 1
          fi
          echo "Single migration head — OK"
